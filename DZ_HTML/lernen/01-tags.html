<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 · Tags · HTML Lerneinheit</title>
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

    <div id="bg-shader" class="bg-layer"></div>
    <div class="bg-grain"></div>

    <div class="page">
        <div class="shell">
            <header class="topbar">
                <div class="brand">
                    <span class="brand-dot"></span>
                    Lerneinheit <span class="brand-sep">/</span> 01
                </div>
                <a href="../lerneinheit.html" class="back-link">
                    <span class="arr" aria-hidden="true">←</span>
                    Kapitel
                </a>
            </header>

            <section class="lesson-head">
                <div class="lesson-num">Kapitel 01</div>
                <h1 class="lesson-title">Tags</h1>
            </section>

            <div class="video-wrap">
                <!-- Hier dein Video einfügen, z. B. <source src="01-tags.mp4" type="video/mp4"> -->
                <video controls preload="metadata" playsinline>
                    <source src="videos/tags.mp4" type="video/mp4">
                </video>
                <div class="video-placeholder" aria-hidden="true">
                    <div class="video-placeholder-icon">▶</div>
                    <div class="video-placeholder-label">Video 01 · Tags</div>
                    <div class="video-placeholder-hint">Hier wird das Video zu diesem Kapitel abgespielt.</div>
                </div>
            </div>

            <nav class="lesson-nav" aria-label="Kapitelnavigation">
                <a href="../lerneinheit.html" class="lesson-nav-btn">
                    <span class="arr" aria-hidden="true">←</span> Übersicht
                </a>
                <a href="02-ueberschriften.html" class="lesson-nav-btn primary">
                    Weiter · 02 <span class="arr" aria-hidden="true">→</span>
                </a>
            </nav>
        </div>
    </div>

    <script src="../assets/shader.js"></script>
    <script src="../assets/main.js"></script>
    <script>
        // Hide placeholder automatically once a real video source is added
        document.addEventListener('DOMContentLoaded', function () {
            var v = document.querySelector('.video-wrap video');
            var src = v && v.querySelector('source');
            if (src && src.getAttribute('src')) {
                var ph = document.querySelector('.video-placeholder');
                if (ph) ph.style.display = 'none';
            }
        });
    </script>
</body>
</html>
